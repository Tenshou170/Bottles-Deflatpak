name: CI/CD

on:
  workflow_dispatch:

jobs:
  validate:
    name: "Validate & Version"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP "version: '\K[^']+" meson.build | head -1)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install system dependencies for pre-commit hooks
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gobject-introspection \
            gir1.2-gtk-4.0 \
            libgtk-4-dev \
            pkg-config
      - uses: pre-commit/action@v3.0.1

  tarball:
    name: "Build Binary Tarball (.tar.gz)"
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            blueprint-compiler \
            gettext \
            desktop-file-utils \
            appstream \
            python3-dev \
            python3-pip \
            libglib2.0-dev \
            libglib2.0-bin \
            libgtk-4-dev \
            libadwaita-1-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1
          sudo pip3 install --break-system-packages "meson>=1.5.0"
          meson --version

      - name: Build Tarball Package
        run: |
          chmod +x build-packages.sh
          ./build-packages.sh

      - name: Upload Tarball
        uses: actions/upload-artifact@v4
        with:
          name: binary-tarball
          path: "*.tar.gz"

  arch:
    name: "Build Arch Package (.pkg.tar.zst)"
    needs: [validate]
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Build Dependencies & Setup Repos
        run: |
          # Enable multilib
          printf "\n[multilib]\nInclude = /etc/pacman.d/mirrorlist\n" >> /etc/pacman.conf

          # Setup Chaotic-AUR (Using TrustAll to bypass unreliable GPG keyservers in CI)
          # Use single quotes to ensure $arch is passed literally to pacman.conf
          printf '\n[chaotic-aur]\nSigLevel = Optional TrustAll\nServer = https://cdn-mirror.chaotic.cx/chaotic-aur/$arch\n' >> /etc/pacman.conf

          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            meson \
            ninja \
            blueprint-compiler \
            gettext \
            desktop-file-utils \
            appstream-glib \
            python \
            pkg-config \
            glib2 \
            gtk4 \
            libadwaita \
            python-gobject \
            sudo \
            yay

          # Add builder user as makepkg cannot run as root
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chown -R builder:builder .

      - name: Build ZST Package
        run: |
          VERSION=$(grep -oP "version: '\K[^']+" meson.build | head -1)
          cp packaging/aur/PKGBUILD .
          # Use local source files for the build
          tar -h --exclude=.git --transform "s|^|Bottles-Deflatpak-${VERSION}/|" -czf /tmp/bottles-v${VERSION}.tar.gz .
          mv /tmp/bottles-v${VERSION}.tar.gz .

          # Update PKGBUILD for local build
          sed -i "s#pkgver=.*#pkgver=${VERSION}#" PKGBUILD
          sed -i "s#source=.*#source=(\"bottles-v${VERSION}.tar.gz\")#" PKGBUILD
          sed -i "s#sha256sums=.*#sha256sums=('SKIP')#" PKGBUILD

          chown builder:builder ./*
          # Now with Chaotic-AUR enabled, we can use -s to pull all dependencies
          su builder -c "makepkg -fsc --noconfirm"

      - name: Upload ZST
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  deb:
    name: "Build Debian Package (.deb)"
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper-compat \
            meson \
            ninja-build \
            blueprint-compiler \
            gettext \
            desktop-file-utils \
            appstream \
            pkg-config \
            cmake \
            gobject-introspection \
            libglib2.0-dev \
            libglib2.0-bin \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            gir1.2-gtk-4.0 \
            python3-dev \
            python3-gi \
            python3-pip
          sudo pip3 install --break-system-packages "meson>=1.5.0"
          meson --version

      - name: Build DEB Package
        run: |
          cp -r packaging/deb/debian .
          # Use -d to skip build dependency check (satisfied by pip meson)
          dpkg-buildpackage -d -us -uc -b
          mv ../bottles-deflatpak_*.deb .

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "bottles-deflatpak_*.deb"

  rpm:
    name: "Build Fedora/openSUSE Package (.rpm)"
    needs: [validate]
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          dnf install -y \
            meson \
            rpm-build \
            ninja-build \
            blueprint-compiler \
            desktop-file-utils \
            libappstream-glib \
            python3-devel \
            gettext \
            gcc \
            python3-gobject-devel \
            libadwaita-devel \
            gtk4-devel \
            python3-pip
          pip3 install "meson>=1.5.0"
          meson --version

      - name: Prepare & Build RPM
        run: |
          VERSION=$(grep -oP "version: '\K[^']+" meson.build | head -1)
          # Setup local rpmbuild directory in workspace
          mkdir -p rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          # Use tar --transform to add the required directory prefix
          # Use -h to dereference symlinks, ensuring translation aliases are included as real files
          tar -h --exclude=.git --exclude=rpmbuild --transform "s|^|Bottles-Deflatpak-${VERSION}/|" -czf rpmbuild/SOURCES/bottles-v${VERSION}.tar.gz .

          cp packaging/rpm/bottles.spec rpmbuild/SPECS/
          sed -i "s|Source0:.*|Source0: bottles-v${VERSION}.tar.gz|" rpmbuild/SPECS/bottles.spec
          # Use --nodeps to skip package database checks
          rpmbuild --nodeps --define "_topdir $(pwd)/rpmbuild" --define "dist %{nil}" -bb rpmbuild/SPECS/bottles.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: rpmbuild/RPMS/noarch/*.rpm

  nix:
    name: "Build Nix Packages"
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # The action will automatically push all new store paths created in the build step below.
      - name: Build Nix Packages
        run: |
          nix build .#bottles-deflatpak .#bottles-deflatpak-unwrapped \
            --extra-experimental-features "nix-command flakes" \
            --print-build-logs

  release:
    name: "Create/Update Release"
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [validate, tarball, arch, deb, rpm, nix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          find ./artifacts -type f -name "*.tar.gz" -exec cp {} release-assets/ \;
          find ./artifacts -type f -name "*.pkg.tar.zst" -exec cp {} release-assets/ \;
          find ./artifacts -type f -name "*.deb" -exec cp {} release-assets/ \;
          find ./artifacts -type f -name "*.rpm" -exec cp {} release-assets/ \;

      - name: Update Tag and Cleanup Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Updating tag $TAG to point to the current commit..."
          git tag -f "$TAG"
          git push origin "$TAG" --force

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Deleting existing release $TAG to avoid body duplication..."
            gh release delete "$TAG" --yes
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: ${{ needs.validate.outputs.version }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
